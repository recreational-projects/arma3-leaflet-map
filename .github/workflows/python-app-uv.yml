name: Python 3.13 application with uv on Ubuntu

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install uv - latest if not defined in `pyproject.toml`
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        # Faster than using uv, as it caches Python on GitHub runner
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: uv sync --dev

      - name: Lint with ruff
        # by default: exit with error if rule violations
        run: uv run ruff check --output-format=github

      - name: Type check with ty
        # by default: exit with error if rule violations
        run: uv run ty check --output-format=github
